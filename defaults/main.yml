---
# Default variables for Keepalived setup
install_keepalived: "true"
configure_keepalived: "true"

# Global Keepalived instance name (used to auto-generate instance names if not specified)
keepalived_instance_name: "VRRP"

# Keepalived configuration - list of VRRP instances
# keepalived_instances:
#   - name: "VRRP_1"
#     interface: "eth0"
#     virtual_router_id: 51
#     virtual_ipaddress:
#       - "192.168.1.10/24"
#     advert_interval: "1"
#     authentication_password: "password"
keepalived_instances: []
keepalived_advert_interval: "1"
keepalived_authentication_password: "password"

# Unicast source IPs per instance name (optional, defaults to ansible_host for all instances)
# keepalived_unicast_src_ips:
#   "VRRP_1": "192.168.1.5"
keepalived_unicast_src_ips: {}

keepalived_track_process: "false"
#keepalived_track_process_name: "Set this to the name of the process to track"
