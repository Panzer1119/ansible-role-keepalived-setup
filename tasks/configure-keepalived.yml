---
- name: "Gather host facts"
  setup:
    gather_subset:
      - "network"

- name: "Set Keepalived router_id"
  set_fact:
    keepalived_router_id: "{{ ansible_hostname }}"

- name: "Set Keepalived vrrp_instance_state and priority based on host role"
  set_fact:
    keepalived_vrrp_instance_state: "{{ 'MASTER' if inventory_hostname in groups['master'] else 'BACKUP' }}"
    keepalived_priority: "{{ hostvars[inventory_hostname].keepalived_priority | default(150 if inventory_hostname in groups['master'] else 100) }}"

- name: "Set Keepalived unicast_src_ips"
  set_fact:
    keepalived_unicast_src_ips: "{{ hostvars[inventory_hostname].get('keepalived_unicast_src_ips', {}) }}"

- name: "Set Keepalived track_process and track_process_name on a per host basis"
  set_fact:
    keepalived_track_process: "{{ hostvars[inventory_hostname].keepalived_track_process | default(keepalived_track_process) }}"
    keepalived_track_process_name: "{{ hostvars[inventory_hostname].keepalived_track_process_name | default(keepalived_track_process_name | default('')) }}"

- name: "Normalize Keepalived instances with per-instance unicast computation"
  set_fact:
    keepalived_instances_effective: "{{ keepalived_instances_effective | default([]) + [_instance_normalized] }}"
  vars:
    _instance_name: "{{ item.name | default(keepalived_instance_name + '_' + item.interface) }}"
    _unicast_src_ip: "{{ keepalived_unicast_src_ips.get(_instance_name, ansible_host) }}"
    # For each host, use instance-specific unicast IP if set, otherwise fallback to their ansible_host
    _unicast_peers_master: |-
      {%- set peers = [] -%}
      {%- for host in groups['master'] -%}
        {%- set peer_ip = hostvars[host].get('keepalived_unicast_src_ips', {}).get(_instance_name, hostvars[host].get('ansible_host')) -%}
        {%- if peer_ip -%}
          {%- set _ = peers.append(peer_ip) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ peers }}
    _unicast_peers_backup: |-
      {%- set peers = [] -%}
      {%- for host in groups['backup'] -%}
        {%- set peer_ip = hostvars[host].get('keepalived_unicast_src_ips', {}).get(_instance_name, hostvars[host].get('ansible_host')) -%}
        {%- if peer_ip -%}
          {%- set _ = peers.append(peer_ip) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ peers }}
    _unicast_peers: "{{ (_unicast_peers_master + _unicast_peers_backup) | difference([_unicast_src_ip]) }}"
    _instance_normalized:
      name: "{{ _instance_name }}"
      interface: "{{ item.interface }}"
      virtual_router_id: "{{ item.virtual_router_id | default(keepalived_virtual_router_id | default(1)) }}"
      advert_interval: "{{ item.advert_interval | default(keepalived_advert_interval | default(1)) }}"
      authentication_password: "{{ item.authentication_password | default(keepalived_authentication_password | default('password')) }}"
      virtual_ipaddress: "{{ item.virtual_ipaddress | default([]) }}"
      state: "{{ item.state | default(keepalived_vrrp_instance_state) }}"
      priority: "{{ item.priority | default(keepalived_priority) }}"
      unicast_src_ip: "{{ _unicast_src_ip }}"
      unicast_peers: "{{ item.unicast_peers | default(_unicast_peers) }}"
  loop: "{{ keepalived_instances }}"

- name: "Validate Keepalived instances"
  assert:
    that:
      - item.name is defined
      - item.interface is defined
      - item.virtual_ipaddress is defined
      - item.virtual_ipaddress | length > 0
    fail_msg: "Each Keepalived instance needs name, interface, and at least one virtual_ipaddress entry."
  loop: "{{ keepalived_instances_effective }}"

- name: "Create Keepalived configuration file"
  template:
    src: "keepalived.conf.j2"
    dest: "/etc/keepalived/keepalived.conf"
  become: "yes"
  notify: "Restart keepalived service"
